language = "C"
include_guard = "INTERPRETER_DSP_C_H"
autogen_warning = "/* Auto-generated by cbindgen — do not modify manually */"
no_includes = false
sys_includes = ["stdbool.h", "stdint.h", "stdlib.h"]
after_includes = """
#ifndef FAUSTFLOAT
#define FAUSTFLOAT float
#endif
"""
# cbindgen generates C declarations from the extern "C" functions.
# UIGlue, MetaGlue are inlined directly in the header (after_includes section above
# is not enough — they are declared as Rust #[repr(C)] types so cbindgen emits them).

[parse]
parse_deps = false

[export]
include = [
    "UIGlue",
    "MetaGlue",
]
# Mark factory/instance wrappers as opaque C types
opaque = ["InterpreterDspFactory", "InterpreterDspInstance"]

[export.rename]
"InterpreterDspFactory" = "interpreter_dsp_factory"
"InterpreterDspInstance" = "interpreter_dsp"

[fn]
prefix = ""
postfix = ""
args = "auto"
