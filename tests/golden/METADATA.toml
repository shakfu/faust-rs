[reference]
cpp_repo = "https://github.com/grame-cncm/faust"
cpp_branch = "master-dev-ocpp-od-fir-2-FIR19"
cpp_commit = "8eebea429"

[policy]
normalization = [
  "normalize_line_endings",
  "trim_trailing_whitespace",
  "ensure_single_final_newline",
]

[commands]
generate_cpp = "cargo run -p xtask -- golden-gen-cpp -- <cpp-faust-extra-args>"
generate_rust = "cargo run -p xtask -- golden-gen-rust"
check_rust = "cargo run -p xtask -- golden-check"
check_cpp = "cargo run -p xtask -- golden-check-cpp"
