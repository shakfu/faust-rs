schema_version = 1
format = "json"
backend = "interp"
snapshot_ref = "rust"

# Phase 2 scaffold note:
# Comparisons are currently exact JSON using a deterministic renderer.
# Tolerance-based numeric comparison will be introduced in a follow-up increment.
compare_mode = "exact-json"

default_sample_rate = 48000
default_block_size = 64
default_num_blocks = 4

[enabled_cases]
trace_01_passthrough = ["impulse", "ramp"]
trace_09_ui_slider = ["impulse"]
trace_31_extended_primitives_typed = ["zeros"]
