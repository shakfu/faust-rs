schema_version = 1
format = "json"
backend = "interp"
snapshot_ref = "rust"

# Phase 2 scaffold note:
# Comparisons parse the JSON trace and compare metadata/shape exactly, with
# tolerance-based float comparison for samples.
compare_mode = "tolerant-float-json"
abs_tol = 1e-6
rel_tol = 1e-5

default_sample_rate = 48000
default_block_size = 64
default_num_blocks = 4

[enabled_cases]
trace_01_passthrough = ["impulse", "ramp"]
trace_09_ui_slider = ["impulse"]
trace_31_extended_primitives_typed = ["zeros"]
trace_40_int_plus_one = ["ramp"]
