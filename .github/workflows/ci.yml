name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace --all-targets

  lint_and_test:
    name: Lint and test (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Backend C++ module-first checks
        run: |
          cargo test -p codegen --all-targets
          cargo run -p compiler -- --dump-cpp tests/corpus/rep_01_passthrough.dsp
          cargo run -p xtask -- cpp-backend-diff-report

      - name: Golden output check
        run: cargo run -p xtask -- golden-check

      - name: Backend alignment smoke (PR only)
        if: github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest'
        run: cargo run -p xtask -- backend-align-smoke --skip-golden

  vector_retention:
    name: Checked vector retention (Ubuntu)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Faust standard libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y faust

      - name: Checked vector coverage retention
        run: cargo run -p xtask -- vector-coverage-check

      - name: Checked vector interpreter optimization parity
        run: cargo run -p xtask -- vector-interp-opt-check

      - name: Release vector compilation cost budget
        run: cargo run --release -p xtask -- vector-compile-budget-check
